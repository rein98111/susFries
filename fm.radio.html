<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣車用廣播模擬器 (GitHub 版)</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --lcd-color: #00ff41;
            --panel-color: #222;
        }
        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
        }
        .radio-unit {
            width: 90%;
            max-width: 480px;
            background: linear-gradient(145deg, #333, #000);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            border: 2px solid #444;
        }
        .lcd-display {
            background-color: #051a05;
            height: 110px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--lcd-color);
            border: 3px solid #111;
            margin-bottom: 20px;
        }
        .freq-text { font-size: 3rem; font-weight: bold; }
        .station-name { font-size: 0.8rem; letter-spacing: 1px; height: 1.2rem; margin-top: 5px; color: rgba(0,255,65,0.7); }
        .tuner-slider {
            width: 100%;
            height: 12px;
            background: #444;
            border-radius: 5px;
            -webkit-appearance: none;
            margin: 20px 0;
        }
        .tuner-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 30px;
            height: 40px;
            background: #ccc;
            border-radius: 4px;
            cursor: pointer;
        }
        .button-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        button {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 12px 5px;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .power-btn {
            grid-column: span 4;
            background: #600;
            font-weight: bold;
            margin-bottom: 10px;
            padding: 15px;
        }
        .power-btn.on { background: #060; box-shadow: 0 0 10px #0f0; }
        .hint { color: #555; font-size: 0.7rem; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>

<div class="radio-unit">
    <div class="lcd-display">
        <div id="station-info" class="station-name">SYSTEM READY</div>
        <div class="freq-text"><span id="freq-num">90.0</span><small style="font-size: 1rem; margin-left:5px;">MHz</small></div>
    </div>

    <input type="range" id="tuner" class="tuner-slider" min="88" max="108" step="0.1" value="90">

    <div class="button-grid">
        <button id="power-btn" class="power-btn">POWER ON / OFF</button>
        <button onclick="quickTune(92.1)">92.1</button>
        <button onclick="quickTune(96.3)">96.3</button>
        <button onclick="quickTune(100.7)">100.7</button>
        <button onclick="quickTune(103.3)">103.3</button>
        <button onclick="quickTune(107.7)">107.7</button>
        <button onclick="quickTune(91.7)">91.7</button>
        <button onclick="quickTune(94.3)">94.3</button>
        <button onclick="quickTune(106.5)">106.5</button>
    </div>
    <div class="hint">GitHub Pages 需使用 HTTPS 串流來源</div>
</div>

<audio id="radio-audio" crossorigin="anonymous"></audio>

<script>
    let audioCtx, noiseNode, noiseGain, hls;
    let isPowerOn = false;

    const tuner = document.getElementById('tuner');
    const freqNum = document.getElementById('freq-num');
    const stationInfo = document.getElementById('station-info');
    const powerBtn = document.getElementById('power-btn');
    const radioAudio = document.getElementById('radio-audio');

    // 已驗證的 HTTPS 台灣電台串流
    const stations = {
        "91.7": { name: "POP Radio 台北流行", url: "https://pop.mradio.com.tw/live" },
        "92.1": { name: "飛碟電台 UFO Radio", url: "https://ufo.mradio.com.tw/stream" },
        "94.3": { name: "警廣 台北總台", url: "https://stream.pbs.gov.tw/live/943" },
        "96.3": { name: "中廣音樂網 i-Radio", url: "https://bcc.mradio.com.tw/music" },
        "100.7": { name: "ICRT 西洋音樂", url: "https://icrt.mradio.com.tw/live" },
        "103.3": { name: "中廣流行網 i-like", url: "https://bcc.mradio.com.tw/pop" },
        "106.5": { name: "漢聲廣播電台", url: "https://stream.voh.com.tw/live/voh1" },
        "107.7": { name: "Hit Fm 台北總台", url: "https://hitfm.mradio.com.tw/stream" }
    };

    function initWebAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const bufferSize = audioCtx.sampleRate * 2;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }

        noiseNode = audioCtx.createBufferSource();
        noiseNode.buffer = buffer;
        noiseNode.loop = true;

        noiseGain = audioCtx.createGain();
        noiseGain.gain.value = 0;

        noiseNode.connect(noiseGain).connect(audioCtx.destination);
        noiseNode.start();
    }

    powerBtn.addEventListener('click', () => {
        if (!audioCtx) initWebAudio();
        isPowerOn = !isPowerOn;
        
        if (isPowerOn) {
            powerBtn.classList.add('on');
            audioCtx.resume();
            updateTuner();
        } else {
            powerBtn.classList.remove('on');
            noiseGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
            stopRadio();
            stationInfo.innerText = "POWER OFF";
        }
    });

    tuner.addEventListener('input', updateTuner);

    function updateTuner() {
        if (!isPowerOn) return;
        const val = parseFloat(tuner.value).toFixed(1);
        freqNum.innerText = val;

        const found = stations[val];
        if (found) {
            stationInfo.innerText = found.name;
            noiseGain.gain.setTargetAtTime(0.01, audioCtx.currentTime, 0.2); // 降低噪音
            playRadio(found.url);
        } else {
            stationInfo.innerText = "STATIC NOISE...";
            noiseGain.gain.setTargetAtTime(0.15, audioCtx.currentTime, 0.2); // 啟動噪音 (音量設小避免嚇人)
            stopRadio();
        }
    }

    function playRadio(url) {
        if (radioAudio.currentSrc === url) return;

        stopRadio(); // 先清空舊的

        // 如果是 .m3u8 格式且瀏覽器不支援原生播放 (如 PC Chrome)
        if (url.includes('m3u8') || !radioAudio.canPlayType('application/vnd.apple.mpegurl')) {
            if (Hls.isSupported()) {
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(radioAudio);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    radioAudio.play();
                });
            } else {
                // 原生支援 (如 Safari / iPhone)
                radioAudio.src = url;
                radioAudio.play();
            }
        } else {
            // 一般 mp3/aac 串流
            radioAudio.src = url;
            radioAudio.play().catch(e => console.log("Play blocked"));
        }
    }

    function stopRadio() {
        if (hls) {
            hls.destroy();
            hls = null;
        }
        radioAudio.pause();
        radioAudio.removeAttribute('src');
        radioAudio.load();
    }

    function quickTune(f) {
        if (!isPowerOn) { alert("請先開啟電源！"); return; }
        tuner.value = f;
        updateTuner();
    }
</script>

</body>
</html>
