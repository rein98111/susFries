<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Twitch Chat (Self-Contained)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tmi.js/1.8.5/tmi.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: transparent;
            font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            height: 100vh;
        }

        #chat-container {
            width: 100%;
            max-width: 400px;
        }

        .message-box {
            background: rgba(15, 15, 15, 0.85); /* 深色背景 */
            backdrop-filter: blur(8px);
            border-left: 5px solid #ff66aa; /* 側邊裝飾 */
            margin-bottom: 12px;
            padding: 12px 18px;
            border-radius: 6px;
            animation: slideIn 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        .username {
            font-weight: 800;
            font-size: 17px;
            display: block;
            margin-bottom: 4px;
            filter: brightness(1.2); /* 讓顏色亮一點 */
        }

        .message {
            color: #ffffff;
            font-size: 16px;
            line-height: 1.5;
            word-wrap: break-word;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>

    <div id="chat-container"></div>

    <script>
        // --- 設定區 ---
        const CHANNEL = 'sus_osu'; // 改成你的 Twitch ID (必須全小寫)

        const container = document.getElementById('chat-container');

        // 偵測 tmi 是否真的載入了
        if (typeof tmi === 'undefined') {
            container.innerHTML = '<div style="color:red; background:white;">錯誤：tmi.js 載入失敗。請檢查網路連線或嘗試更換瀏覽器測試。</div>';
        } else {
            const client = new tmi.Client({
                connection: { secure: true, reconnect: true },
                channels: [ CHANNEL ]
            });

            client.connect().catch(console.error);

            client.on('message', (channel, tags, message, self) => {
                const msgBox = document.createElement('div');
                msgBox.className = 'message-box';

                const userColor = tags.color || '#ff66aa';
                const name = tags['display-name'];

                msgBox.innerHTML = `
                    <span class="username" style="color: ${userColor}">${name}</span>
                    <span class="message">${message}</span>
                `;

                container.appendChild(msgBox);

                // 限制訊息顯示數量
                if (container.children.length > 8) {
                    container.removeChild(container.children[0]);
                }

                window.scrollTo(0, document.body.scrollHeight);
            });
        }
    </script>
</body>
</html>
