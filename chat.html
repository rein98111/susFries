<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Twitch Chat Fix</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: transparent;
            font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif;
            overflow: hidden;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            height: 100vh;
        }
        #chat-container { width: 100%; max-width: 400px; }
        .message-box {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            border-left: 4px solid #ff66aa;
            margin-bottom: 8px;
            padding: 10px;
            border-radius: 4px;
            animation: slide 0.2s ease-out;
        }
        .username { font-weight: bold; margin-right: 8px; }
        @keyframes slide { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

    <div id="chat-container">正在嘗試連線伺服器...</div>

    <script type="module">
        // 改用這個網址，並使用 import 語法
        import tmi from 'https://cdn.skypack.dev/tmi.js';

        const CHANNEL_NAME = 'sus_osu'; // <--- 記得改這裡

        const container = document.getElementById('chat-container');
        container.innerHTML = ''; // 清空提示文字

        const client = new tmi.Client({
            connection: { reconnect: true, secure: true },
            channels: [ CHANNEL_NAME ]
        });

        client.connect().catch(err => {
            container.innerHTML = '連線失敗，請檢查網路或帳號名稱';
            console.error(err);
        });

        client.on('message', (channel, tags, message, self) => {
            const msgBox = document.createElement('div');
            msgBox.className = 'message-box';
            
            const color = tags.color || '#ff66aa';
            const name = tags['display-name'];

            msgBox.innerHTML = `
                <span class="username" style="color: ${color}">${name}:</span>
                <span class="message">${message}</span>
            `;

            container.appendChild(msgBox);
            if (container.children.length > 10) container.removeChild(container.children[0]);
        });
    </script>
</body>
</html>
