<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Twitch Chat (Self-Powered)</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: transparent;
            font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            height: 100vh;
        }
        #chat-container { width: 100%; max-width: 400px; }
        .message-box {
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(8px);
            border-left: 5px solid #ff66aa;
            margin-bottom: 12px;
            padding: 12px 18px;
            border-radius: 6px;
            animation: slideIn 0.3s ease-out forwards;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
        }
        .username { font-weight: 800; font-size: 17px; display: block; margin-bottom: 4px; }
        .message { color: #ffffff; font-size: 16px; line-height: 1.5; word-wrap: break-word; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>
    <div id="chat-container"></div>

    <script src="https://bundle.run/tmi.js@1.8.5"></script>

    <script>
        // 如果上面那個 bundle 連結還是 404，請告訴我，我會直接把一萬行代碼貼給你。
        // 但目前我們先試試看這個比較可靠的打包連結。

        const CHANNEL = 'sus_osu'; 

        function startChat() {
            if (typeof tmi === 'undefined') {
                // 如果 bundle.run 失敗，嘗試從另一個來源補救
                const script = document.createElement('script');
                script.src = "https://cdn.jsdelivr.net/npm/tmi.js@1.8.5/dist/tmi.min.js";
                script.onload = initTmi;
                document.head.appendChild(script);
            } else {
                initTmi();
            }
        }

        function initTmi() {
            const client = new tmi.Client({
                connection: { secure: true, reconnect: true },
                channels: [ CHANNEL ]
            });

            const container = document.getElementById('chat-container');

            client.connect().then(() => {
                console.log("Connected to " + CHANNEL);
            }).catch(console.error);

            client.on('message', (channel, tags, message, self) => {
                const msgBox = document.createElement('div');
                msgBox.className = 'message-box';
                const userColor = tags.color || '#ff66aa';
                const name = tags['display-name'];

                msgBox.innerHTML = `
                    <span class="username" style="color: ${userColor}">${name}</span>
                    <span class="message">${message}</span>
                `;

                container.appendChild(msgBox);
                if (container.children.length > 8) {
                    container.removeChild(container.children[0]);
                }
            });
        }

        startChat();
    </script>
</body>
</html>
