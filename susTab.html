<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard</title>
    <style>
        /* --- CSS 樣式區 --- */
        body, html {
            margin: 0; padding: 0; height: 100%;
            color: white; font-family: "Microsoft JhengHei", sans-serif;
            overflow: hidden; /* 隱藏全網頁捲軸 */
        }

        /* 背景影片 */
        #bg-video {
            position: fixed; right: 0; bottom: 0;
            min-width: 100%; min-height: 100%;
            z-index: -1; object-fit: cover;
            filter: brightness(0.6); /* 稍微調暗背景，讓文字更清楚 */
        }

        /* 主容器佈局 */
        .main-container {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            height: 100vh;
            padding: 40px;
            box-sizing: border-box;
        }

        /* 通用面板樣式 (毛玻璃) */
        .side-panel {
            width: 280px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            height: 80vh;
            display: flex;
            flex-direction: column;
        }

        /* 左側資訊 */
        #clock { font-size: 3rem; font-weight: bold; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        #date { font-size: 1.2rem; margin-bottom: 5px; color: #ddd; }
        #weather { font-size: 1.1rem; color: #00d4ff; margin-bottom: 30px; }
        
        .changelog { flex-grow: 1; overflow-y: auto; }
        .changelog h3 { border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px; }
        .changelog ul { padding-left: 20px; font-size: 0.95rem; line-height: 1.8; }

        /* 中間搜尋區 */
        .center-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0 40px;
            padding-top: 15vh;
        }

        .search-logo {
            width: 180px; /* sus.png 的大小控制 */
            margin-bottom: 30px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
        }

        .search-box-container {
            width: 100%;
            max-width: 650px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
        }

        /* 右側影片列表 */
        .video-list-container {
            overflow-y: auto;
            flex-grow: 1;
        }
        .video-item {
            padding: 15px;
            margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            transition: 0.3s;
            cursor: pointer;
            border: 1px solid transparent;
        }
        .video-item:hover {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* 隱藏 Google 預設背景與邊框 */
        .gsc-control-cse { background-color: transparent !important; border: none !important; padding: 0 !important; }
        .gsc-input-box { border-radius: 20px !important; overflow: hidden !important; }
        .gcsc-branding { display: none !important; } /* 隱藏 Google Logo */

        /* 捲動軸樣式 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body>

    <video autoplay muted loop id="bg-video">
        <source src="background.mp4" type="video/mp4">
        Your browser does not support HTML5 video.
    </video>

    <div class="main-container">
        <div class="side-panel">
            <div id="clock">00:00:00</div>
            <div id="date">2026/03/18</div>
            <div id="weather">桃園市 22°C ☁️</div>
            
            <div class="changelog">
                <h3>更新日誌</h3>
                <ul>
                    <li>自訂搜尋引擎佈局整合</li>
                    <li>新增背景影片支援</li>
                    <li>加入動態時鐘與氣溫顯示</li>
                    <li>右側影片捲動列表優化</li>
                </ul>
            </div>
        </div>

        <div class="center-panel">
            <img src="sus.png" alt="Logo" class="search-logo">
            <div class="search-box-container">
                <script async src="https://cse.google.com/cse.js?cx=1193b39a9705e4e98"></script>
                <div class="gcse-search"></div>
            </div>
        </div>

        <div class="side-panel">
            <h3>影片列表</h3>
            <div class="video-list-container">
                <div class="video-item">🎬 我的 Minecraft 城市巡禮</div>
                <div class="video-item">🎬 插件開發實錄 #1</div>
                <div class="video-item">🎬 速度挑戰：RunnerRelay</div>
                <div class="video-item">🎬 桃園景點隨手拍</div>
                <div class="video-item">🎬 測試影片 01</div>
                <div class="video-item">🎬 測試影片 02</div>
                <div class="video-item">🎬 測試影片 03</div>
                </div>
        </div>
    </div>

    <script>
        // --- JavaScript 邏輯區 ---
        function updateTime() {
            const now = new Date();
            // 格式化時間：HH:mm:ss
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').innerText = `${hours}:${minutes}:${seconds}`;

            // 格式化日期
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            document.getElementById('date').innerText = now.toLocaleDateString('zh-TW', options);
        }

        // 每秒執行一次
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
