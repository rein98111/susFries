<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jubeat Terminal - Fixed</title>
    <style>
        :root { 
            --bg: #050508; --accent: #00f2ff; --grid-idle: #10101a; 
            --grid-border: #1a1a2e; --perfect: #fff700;
            --font-main: 'Orbitron', sans-serif;
        }
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        body {
            margin: 0; background: var(--bg); color: white;
            font-family: var(--font-main), sans-serif; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; width: 100vw; position: fixed;
            background-image: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050508 100%);
        }

        /* UI 佈局 */
        #ui { 
            width: 95vmin; max-width: 550px; display: flex; 
            justify-content: space-between; align-items: flex-end;
            margin-bottom: 15px; padding: 0 10px; border-bottom: 2px solid var(--grid-border);
        }
        .stat-label { font-size: 10px; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; }
        #score { font-size: 8vmin; color: white; text-shadow: 0 0 10px var(--accent); }
        #combo { font-size: 5vmin; color: var(--accent); }

        /* 遊戲網格 */
        #game-container {
            position: relative; width: 95vmin; height: 95vmin; max-width: 550px; max-height: 550px;
            background: rgba(0,0,0,0.6); display: grid; grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr); gap: 8px; padding: 12px; 
            border: 4px solid var(--grid-border); border-radius: 4px; touch-action: none;
        }

        .cell {
            position: relative; background: var(--grid-idle); border: 1px solid var(--grid-border);
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8); border-radius: 2px;
        }
        .cell.active { background: var(--accent); box-shadow: 0 0 30px var(--accent); }

        /* 音符與縮圈 */
        .note {
            position: absolute; inset: 10%; border-radius: 4px;
            background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, transparent 100%);
            border: 2px solid white; z-index: 2; pointer-events: none; box-shadow: 0 0 15px white;
        }
        .approach {
            position: absolute; inset: 0; border: 2px solid var(--accent);
            z-index: 3; pointer-events: none; transform: scale(2.5); opacity: 0;
        }

        /* 判定文字 */
        .judge-text {
            position: absolute; width: 100%; text-align: center;
            font-size: 4vmin; font-weight: bold; z-index: 10; top: 40%;
            animation: judgePop 0.3s ease-out forwards;
        }
        @keyframes judgePop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 0; }
        }

        /* 覆蓋層 (開始畫面) */
        #overlay {
            position: absolute; inset: 0; background: rgba(5,5,8,0.98);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; border: 2px solid var(--accent); text-align: center;
        }
        #play-btn {
            padding: 20px 40px; font-size: 20px; border: 2px solid var(--accent);
            background: transparent; color: var(--accent); font-family: 'Orbitron';
            cursor: pointer; margin-top: 20px; transition: 0.3s;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }
        #play-btn:disabled { color: #444; border-color: #444; cursor: not-allowed; }
        #play-btn:not(:disabled):hover { background: var(--accent); color: black; }

        .scanline {
            width: 100%; height: 2px; background: rgba(0, 242, 255, 0.05);
            position: absolute; top: 0; left: 0; z-index: 1;
            animation: scan 4s linear infinite; pointer-events: none;
        }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
    </style>
</head>
<body>

<div class="scanline"></div>
<div id="ui">
    <div><div class="stat-label">Score</div><div id="score">000000</div></div>
    <div style="text-align: right;"><div class="stat-label">Combo</div><div id="combo">0</div></div>
</div>

<div id="game-container">
    <div id="overlay">
        <h1 id="title" style="color:var(--accent)">RUBY TWILIGHT</h1>
        <p id="author">SYSTEM INITIALIZING...</p>
        <button id="play-btn" disabled>LOADING...</button>
    </div>
</div>

<div id="player-container" style="position:absolute; top:-999px;"><div id="video-player"></div></div>

<script>
    // --- 譜面輔助函數 ---
    function generatePattern(start, end, type, step) {
        let p = []; let cur = start; let i = 0;
        while(cur < end) {
            let cell = [0, 5, 10, 15, 12, 9, 6, 3, 1, 4, 11, 14, 2, 7, 8, 13][i % 16];
            if(type === "circle") cell = [5, 6, 10, 9][i % 4];
            p.push({time: Math.round(cur), cell: cell});
            cur += step; i++;
        }
        return p;
    }

    const currentSongMap = {
        notes: [
            {time: 680, cell: 5}, {time: 1360, cell: 10}, {time: 2040, cell: 6}, {time: 2720, cell: 9},
            ...generatePattern(15000, 65000, "zigzag", 680),
            ...generatePattern(66000, 150000, "circle", 340),
            {time: 210000, isEndOfMap: true}
        ]
    };

    // --- 遊戲邏輯 ---
    const CONFIG = { approachTime: 1000, hitWindow: 150 };
    let state = { score: 0, combo: 0, startTime: 0, activeNotes: [], isPlaying: false, noteIndex: 0 };
    
    const container = document.getElementById('game-container');
    const playBtn = document.getElementById('play-btn');
    const scoreEl = document.getElementById('score');
    const comboEl = document.getElementById('combo');

    // 生成格子
    for(let i=0; i<16; i++) {
        const div = document.createElement('div');
        div.className = 'cell'; div.id = `c-${i}`;
        container.appendChild(div);
    }

    // YouTube API
    let player;
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('video-player', {
            videoId: 'yG-0HhHamRc',
            playerVars: { 'playsinline': 1, 'controls': 0, 'disablekb': 1 },
            events: {
                'onReady': () => {
                    playBtn.disabled = false;
                    playBtn.innerText = "START SESSION";
                    document.getElementById('author').innerText = "READY TO BOOT";
                },
                'onStateChange': (e) => {
                    if(e.data === YT.PlayerState.PLAYING && !state.isPlaying) {
                        startGameLogic();
                    }
                }
            }
        });
    }

    // 啟動按鈕 (支援 Click & Touch)
    const handleStart = (e) => {
        if (e) e.preventDefault();
        if (playBtn.disabled) return;
        document.getElementById('overlay').style.display = 'none';
        player.playVideo();
    };

    playBtn.addEventListener('click', handleStart);
    playBtn.addEventListener('touchstart', handleStart);

    function startGameLogic() {
        state.isPlaying = true;
        state.startTime = performance.now();
        state.noteIndex = 0;
        requestAnimationFrame(update);
    }

    function update(now) {
        if(!state.isPlaying) return;
        const elapsed = now - state.startTime;
        const notes = currentSongMap.notes;

        while(state.noteIndex < notes.length && elapsed >= notes[state.noteIndex].time - CONFIG.approachTime) {
            const n = notes[state.noteIndex];
            if(n.isEndOfMap) { setTimeout(resetToTitle, 2000); state.isPlaying = false; break; }
            spawn(n);
            state.noteIndex++;
        }

        state.activeNotes = state.activeNotes.filter(n => {
            const progress = (n.time - elapsed) / CONFIG.approachTime;
            if (progress > 0) {
                n.appEl.style.transform = `scale(${1 + progress * 1.5})`;
                n.appEl.style.opacity = 1 - progress;
            }
            if (elapsed > n.time + CONFIG.hitWindow) {
                n.el.remove(); n.appEl.remove();
                handleJudge("MISS"); return false;
            }
            return true;
        });

        if(state.isPlaying) requestAnimationFrame(update);
    }

    function spawn(note) {
        const cell = document.getElementById(`c-${note.cell}`);
        if(!cell) return;
        const el = document.createElement('div'); el.className = 'note';
        const appEl = document.createElement('div'); appEl.className = 'approach';
        cell.appendChild(el); cell.appendChild(appEl);
        state.activeNotes.push({ ...note, el, appEl });
    }

    function handleJudge(type, idx) {
        if(type === "MISS") { state.combo = 0; } 
        else {
            state.combo++;
            state.score += (type === "PERFECT" ? 312 : 150);
            showJudgeEffect(idx, type);
        }
        scoreEl.innerText = state.score.toString().padStart(6, '0');
        comboEl.innerText = state.combo;
    }

    function showJudgeEffect(idx, text) {
        const cell = document.getElementById(`c-${idx}`);
        const el = document.createElement('div');
        el.className = 'judge-text'; el.innerText = text;
        el.style.color = text === "PERFECT" ? "var(--perfect)" : "white";
        cell.appendChild(el);
        setTimeout(() => el.remove(), 300);
    }

    function resetToTitle() {
        state.isPlaying = false;
        player.stopVideo();
        player.seekTo(0);
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('title').innerText = "FINISH!";
        document.getElementById('author').innerText = `SCORE: ${state.score}`;
        playBtn.innerText = "RETRY";
    }

    // 遊戲觸控 (多指支援)
    container.addEventListener('touchstart', (e) => {
        e.preventDefault();
        Array.from(e.changedTouches).forEach(t => {
            const el = document.elementFromPoint(t.clientX, t.clientY);
            if(el && el.classList.contains('cell')) {
                const idx = parseInt(el.id.split('-')[1]);
                el.classList.add('active');
                
                // 判定邏輯
                const now = performance.now() - state.startTime;
                const hitIdx = state.activeNotes.findIndex(n => n.cell === idx && Math.abs(now - n.time) < CONFIG.hitWindow);
                if(hitIdx !== -1) {
                    const diff = Math.abs(now - state.activeNotes[hitIdx].time);
                    handleJudge(diff < 80 ? "PERFECT" : "GREAT", idx);
                    state.activeNotes[hitIdx].el.remove();
                    state.activeNotes[hitIdx].appEl.remove();
                    state.activeNotes.splice(hitIdx, 1);
                }
                setTimeout(() => el.classList.remove('active'), 100);
            }
        });
    });

    // 載入 API
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);
</script>

</body>
</html>
