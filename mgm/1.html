<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Jubeat Simulator - MultiMap</title>
    <style>
        :root { --bg: #0a0a12; --accent: #00f2ff; --grid-idle: #1a1a2e; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Orbitron', sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #ui { width: 90vmin; display: flex; justify-content: space-between; margin-bottom: 10px; }
        #game-container { position: relative; width: 90vmin; height: 90vmin; display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 10px; background: #000; border: 4px solid #333; border-radius: 8px; }
        .cell { position: relative; background: var(--grid-idle); border-radius: 4px; transition: 0.1s; }
        .cell.active { background: var(--accent); box-shadow: 0 0 20px var(--accent); }
        .note { position: absolute; inset: 10%; border: 2px solid white; border-radius: 4px; z-index: 2; box-shadow: 0 0 10px white; }
        .approach { position: absolute; inset: 0; border: 2px solid var(--accent); z-index: 1; transform: scale(2.5); opacity: 0; }
        #overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; }
        button { padding: 15px 30px; font-size: 1.2rem; background: transparent; color: var(--accent); border: 2px solid var(--accent); cursor: pointer; }
        button:disabled { border-color: #444; color: #444; }
    </style>
</head>
<body>

<div id="ui">
    <div>SCORE: <span id="score">000000</span></div>
    <div>COMBO: <span id="combo">0</span></div>
</div>

<div id="game-container">
    <div id="overlay">
        <h2 id="song-title">LOADING MAP...</h2>
        <button id="start-btn" disabled>INITIALIZING...</button>
    </div>
</div>

<div id="player" style="position:absolute; top:-999px;"></div>

<script>
    const mapId = prompt("請輸入譜面 ID (1: Ruby Twilight, 2: Guitar to Kodoku)", "2");
    const videoIds = { "1": "yG-0HhHamRc", "2": "MRT-MKxlObE" };
    
    let state = { score: 0, combo: 0, isPlaying: false, startTime: 0, noteIndex: 0, activeNotes: [] };
    const CONFIG = { approachTime: 800, hitWindow: 150 };

    // 動態載入譜面
    const script = document.createElement('script');
    script.src = `map${mapId}.js`;
    document.head.appendChild(script);

    // 建立網格
    const container = document.getElementById('game-container');
    for(let i=0; i<16; i++) {
        const div = document.createElement('div');
        div.className = 'cell'; div.id = `c-${i}`;
        container.appendChild(div);
    }

    let player;
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            videoId: videoIds[mapId] || videoIds["1"],
            playerVars: { 'playsinline': 1, 'controls': 0 },
            events: {
                'onReady': () => {
                    const btn = document.getElementById('start-btn');
                    btn.disabled = false;
                    btn.innerText = "START SESSION";
                    document.getElementById('song-title').innerText = window.currentSongMap.title;
                }
            }
        });
    }

    document.getElementById('start-btn').onclick = () => {
        document.getElementById('overlay').style.display = 'none';
        player.playVideo();
        state.isPlaying = true;
        state.startTime = performance.now();
        requestAnimationFrame(gameLoop);
    };

    function gameLoop(now) {
        if(!state.isPlaying) return;
        const elapsed = now - state.startTime;
        const map = window.currentSongMap.notes;

        while(state.noteIndex < map.length && elapsed >= map[state.noteIndex].time - CONFIG.approachTime) {
            spawnNote(map[state.noteIndex]);
            state.noteIndex++;
        }

        state.activeNotes = state.activeNotes.filter(n => {
            const progress = (n.time - elapsed) / CONFIG.approachTime;
            if(progress > 0) {
                n.appEl.style.transform = `scale(${1 + progress * 1.5})`;
                n.appEl.style.opacity = 1 - progress;
            }
            if(elapsed > n.time + CONFIG.hitWindow) {
                n.el.remove(); n.appEl.remove();
                state.combo = 0; updateUI();
                return false;
            }
            return true;
        });
        requestAnimationFrame(gameLoop);
    }

    function spawnNote(note) {
        const cell = document.getElementById(`c-${note.cell}`);
        const el = document.createElement('div'); el.className = 'note';
        const appEl = document.createElement('div'); appEl.className = 'approach';
        cell.appendChild(el); cell.appendChild(appEl);
        state.activeNotes.push({ ...note, el, appEl });
    }

    container.addEventListener('touchstart', (e) => {
        e.preventDefault();
        Array.from(e.changedTouches).forEach(t => {
            const el = document.elementFromPoint(t.clientX, t.clientY);
            if(el && el.classList.contains('cell')) {
                const id = parseInt(el.id.split('-')[1]);
                el.classList.add('active');
                setTimeout(() => el.classList.remove('active'), 100);
                
                const now = performance.now() - state.startTime;
                const hitIdx = state.activeNotes.findIndex(n => n.cell === id && Math.abs(now - n.time) < CONFIG.hitWindow);
                if(hitIdx !== -1) {
                    state.score += 500; state.combo++;
                    state.activeNotes[hitIdx].el.remove();
                    state.activeNotes[hitIdx].appEl.remove();
                    state.activeNotes.splice(hitIdx, 1);
                    updateUI();
                }
            }
        });
    });

    function updateUI() {
        document.getElementById('score').innerText = state.score.toString().padStart(6, '0');
        document.getElementById('combo').innerText = state.combo;
    }

    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);
</script>
</body>
</html>
