<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jubeat Terminal - The Ruby of Twilight</title>
    <style>
        :root { 
            --bg: #050508; 
            --accent: #00f2ff; /* 典型的 Jubeat 科技藍 */
            --grid-idle: #10101a; 
            --grid-border: #1a1a2e;
            --perfect: #fff700;
            --font-main: 'Orbitron', 'Segoe UI', sans-serif;
        }

        /* 引入電子風字體 */
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        body {
            margin: 0; background: var(--bg); color: white;
            font-family: var(--font-main); overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; width: 100vw; position: fixed;
            /* 背景加入微弱的科技感網格紋理 */
            background-image: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050508 100%);
        }

        /* 頂部資訊欄升級 */
        #ui { 
            width: 95vmin; max-width: 550px; 
            display: flex; justify-content: space-between; align-items: flex-end;
            margin-bottom: 15px; padding: 0 10px;
            border-bottom: 2px solid var(--grid-border);
        }
        
        .stat-label { font-size: 10px; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; }
        #score { font-size: 8vmin; color: white; text-shadow: 0 0 10px var(--accent); }
        #combo { font-size: 5vmin; color: var(--accent); }

        /* 遊戲主容器：加上霓虹外框 */
        #game-container {
            position: relative; width: 95vmin; height: 95vmin; max-width: 550px; max-height: 550px;
            background: rgba(0,0,0,0.6); display: grid; grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr); gap: 8px; padding: 12px; 
            border: 4px solid var(--grid-border);
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.15), inset 0 0 20px rgba(0,0,0,0.5);
            border-radius: 4px; touch-action: none;
        }

        /* 格子樣式：更像實體按鍵 */
        .cell {
            position: relative; background: var(--grid-idle);
            border: 1px solid var(--grid-border);
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
            border-radius: 2px; transition: background 0.1s;
        }
        
        /* 點擊時的瞬間發光 (模擬按鍵物理回饋) */
        .cell.active { 
            background: var(--accent); 
            box-shadow: 0 0 30px var(--accent);
            transition: 0s;
        }

        /* Jubeat 風格音符：方中帶圓的數位感 */
        .note {
            position: absolute; inset: 10%; border-radius: 4px;
            background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, transparent 100%);
            border: 2px solid white; z-index: 2; pointer-events: none;
            box-shadow: 0 0 15px white;
        }

        /* 縮圈：改為方形縮框更貼合 Jubeat 介面 */
        .approach {
            position: absolute; inset: 0; border: 2px solid var(--accent);
            z-index: 3; pointer-events: none;
            box-shadow: 0 0 10px var(--accent);
            transform: scale(2.5); opacity: 0;
        }

        /* 判定特效 */
        .judge-text {
            position: absolute; width: 100%; text-align: center;
            font-size: 4vmin; font-weight: bold; z-index: 10;
            top: 40%; pointer-events: none;
            text-shadow: 0 0 8px currentColor;
            animation: judgePop 0.3s ease-out forwards;
        }
        @keyframes judgePop {
            0% { transform: scale(0.5) rotate(-5deg); opacity: 0; }
            50% { transform: scale(1.1) rotate(0deg); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        /* 啟動畫面 Overlay */
        #overlay {
            position: absolute; inset: 0; background: rgba(5,5,8,0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; border: 2px solid var(--accent);
        }
        #overlay h1 { font-size: 7vmin; letter-spacing: 5px; margin-bottom: 5px; color: var(--accent); }
        #overlay p { font-size: 3vmin; color: #666; margin-bottom: 40px; }

        #play-btn {
            padding: 20px 60px; font-size: 24px; border: 2px solid var(--accent);
            background: transparent; color: var(--accent); font-family: var(--font-main);
            cursor: pointer; transition: 0.3s; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }
        #play-btn:hover { background: var(--accent); color: black; box-shadow: 0 0 20px var(--accent); }

        /* 背景裝飾：掃描線 */
        .scanline {
            width: 100%; height: 2px; background: rgba(0, 242, 255, 0.05);
            position: absolute; top: 0; left: 0; z-index: 1;
            animation: scan 4s linear infinite; pointer-events: none;
        }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
    </style>
</head>
<body>

<div class="scanline"></div>

<div id="ui">
    <div>
        <div class="stat-label">Performance Score</div>
        <div id="score">000000</div>
    </div>
    <div style="text-align: right;">
        <div class="stat-label">Combo Sequence</div>
        <div id="combo">0</div>
    </div>
</div>

<div id="game-container">
    <div id="overlay">
        <div class="stat-label" style="margin-bottom: 10px;">Music Selection</div>
        <h1 id="title">RUBY TWILIGHT</h1>
        <p id="author">CYGNUS // SYSTEM-7</p>
        <button id="play-btn">LOAD SYSTEM</button>
    </div>
</div>

<iframe id="video-player" width="0" height="0" src="https://www.youtube.com/embed/yG-0HhHamRc?enablejsapi=1&playsinline=1" frameborder="0"></iframe>

<script src="map.js"></script>
<script>
    /* ... 保持原本的 JS 邏輯不變，僅更新 CSS 類名與效果 ... */
    const CONFIG = { approachTime: 1000, hitWindow: 150 };
    let state = { score: 0, combo: 0, startTime: 0, activeNotes: [], isPlaying: false, noteIndex: 0 };
    
    const container = document.getElementById('game-container');
    const scoreEl = document.getElementById('score');
    const comboEl = document.getElementById('combo');
    
    for(let i=0; i<16; i++) {
        const div = document.createElement('div');
        div.className = 'cell';
        div.id = `c-${i}`;
        container.appendChild(div);
    }

    let player;
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('video-player', {
            events: { 'onStateChange': (e) => { if(e.data === 1) startLoop(); } }
        });
    }

    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    document.getElementById('play-btn').onclick = () => {
        document.getElementById('overlay').style.display = 'none';
        player.playVideo();
    };

    function startLoop() {
        state.isPlaying = true;
        state.startTime = performance.now();
        requestAnimationFrame(update);
    }

    function update(now) {
        if(!state.isPlaying) return;
        const elapsed = now - state.startTime;
        const notes = window.currentSongMap.notes;
        while(state.noteIndex < notes.length && elapsed >= notes[state.noteIndex].time - CONFIG.approachTime) {
            const n = notes[state.noteIndex];
            if(n.cell !== -1) spawn(n);
            state.noteIndex++;
        }
        state.activeNotes = state.activeNotes.filter(n => {
            const progress = (n.time - elapsed) / CONFIG.approachTime;
            if (progress > 0) {
                n.appEl.style.transform = `scale(${1 + progress * 1.5})`;
                n.appEl.style.opacity = 1 - progress;
            } else {
                n.appEl.style.opacity = 0;
            }
            if (elapsed > n.time + CONFIG.hitWindow) {
                n.el.remove(); n.appEl.remove();
                handleJudge("MISS");
                return false;
            }
            return true;
        });
        requestAnimationFrame(update);
    }

    function spawn(note) {
        const cell = document.getElementById(`c-${note.cell}`);
        const el = document.createElement('div'); el.className = 'note';
        const appEl = document.createElement('div'); appEl.className = 'approach';
        cell.appendChild(el); cell.appendChild(appEl);
        state.activeNotes.push({ ...note, el, appEl });
    }

    function handleInput(cellIdx) {
        if(!state.isPlaying) return;
        const now = performance.now() - state.startTime;
        const hitIdx = state.activeNotes.findIndex(n => n.cell === cellIdx && Math.abs(now - n.time) < CONFIG.hitWindow);
        if(hitIdx !== -1) {
            const diff = Math.abs(now - state.activeNotes[hitIdx].time);
            const judge = diff < 80 ? "PERFECT" : (diff < 120 ? "GREAT" : "GOOD");
            handleJudge(judge, cellIdx);
            state.activeNotes[hitIdx].el.remove();
            state.activeNotes[hitIdx].appEl.remove();
            state.activeNotes.splice(hitIdx, 1);
        }
    }

    function handleJudge(type, idx) {
        if(type === "MISS") { state.combo = 0; } 
        else {
            state.combo++;
            state.score += (type === "PERFECT" ? 312 : (type === "GREAT" ? 150 : 50));
            showJudgeEffect(idx, type);
        }
        scoreEl.innerText = state.score.toString().padStart(6, '0');
        comboEl.innerText = state.combo;
    }

    function showJudgeEffect(idx, text) {
        const cell = document.getElementById(`c-${idx}`);
        const el = document.createElement('div');
        el.className = 'judge-text';
        el.innerText = text;
        if(text === "PERFECT") el.style.color = "var(--perfect)";
        else if(text === "GREAT") el.style.color = "#00f2ff";
        else el.style.color = "#fff";
        cell.appendChild(el);
        setTimeout(() => el.remove(), 300);
    }

    container.addEventListener('touchstart', (e) => {
        e.preventDefault();
        Array.from(e.changedTouches).forEach(t => {
            const target = document.elementFromPoint(t.clientX, t.clientY);
            if(target && target.classList.contains('cell')) {
                const idx = parseInt(target.id.split('-')[1]);
                target.classList.add('active');
                handleInput(idx);
                setTimeout(() => target.classList.remove('active'), 100);
            }
        });
    });
</script>
</body>
</html>
