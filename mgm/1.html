<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jubeat Simulator - Auto Loader</title>
    <style>
        :root { --bg: #050508; --accent: #ff4081; --grid-idle: #10101a; --grid-border: #1a1a2e; }
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        body { margin: 0; background: var(--bg); color: white; font-family: 'Orbitron', sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #ui { width: 90vmin; max-width: 500px; display: flex; justify-content: space-between; margin-bottom: 10px; }
        #game-container { position: relative; width: 90vmin; height: 90vmin; max-width: 500px; max-height: 500px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 12px; background: #000; border: 4px solid var(--grid-border); border-radius: 8px; touch-action: none; }
        .cell { position: relative; background: var(--grid-idle); border: 1px solid var(--grid-border); border-radius: 4px; pointer-events: none; }
        .cell.active { background: var(--accent); box-shadow: 0 0 20px var(--accent); }
        .note { position: absolute; inset: 10%; border: 2px solid white; border-radius: 4px; z-index: 2; pointer-events: none; }
        .approach { position: absolute; inset: 0; border: 2px solid var(--accent); z-index: 1; transform: scale(2.5); opacity: 0; pointer-events: none; }
        #overlay { position: absolute; inset: 0; background: rgba(5,5,8,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; }
        #start-btn { padding: 18px 45px; font-size: 1.2rem; background: transparent; color: var(--accent); border: 2px solid var(--accent); cursor: pointer; font-family: 'Orbitron'; }
        #start-btn:disabled { opacity: 0.1; }
        #debug-msg { font-size: 10px; color: #555; margin-top: 15px; }
    </style>
    <script src="map.js"></script>
</head>
<body>

<div id="ui">
    <div id="score" style="font-size:6vmin; color:var(--accent)">000000</div>
    <div style="text-align:right">COMBO<br><span id="combo" style="font-size:6vmin">0</span></div>
</div>

<div id="game-container">
    <div id="overlay">
        <h2 id="title-display">SCANNING...</h2>
        <button id="start-btn" disabled>WAITING...</button>
        <div id="debug-msg">Checking map.js connection...</div>
    </div>
</div>

<div id="player-mount"></div>

<script>
    let player = null;
    let state = { score: 0, combo: 0, isPlaying: false, startTime: 0, noteIndex: 0, activeNotes: [] };
    const CONFIG = { approachTime: 800, hitWindow: 150 };

    // 初始化 16 格
    const container = document.getElementById('game-container');
    for(let i=0; i<16; i++) {
        const div = document.createElement('div');
        div.className = 'cell'; div.id = `c-${i}`;
        container.appendChild(div);
    }

    // 【關鍵修正】: 循環檢查 map.js 是否載入成功
    const checkInterval = setInterval(() => {
        if (window.SONG_MAP) {
            clearInterval(checkInterval);
            console.log("Map Found!", window.SONG_MAP);
            setupGame();
        } else {
            document.getElementById('debug-msg').innerText = "Still looking for 'window.SONG_MAP' in map.js...";
        }
    }, 100);

    function setupGame() {
        document.getElementById('title-display').innerText = window.SONG_MAP.title;
        document.getElementById('debug-msg').innerText = "Map Ready. Loading YouTube API...";
        
        // 動態加載 YouTube API
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);
    }

    window.onYouTubeIframeAPIReady = function() {
        player = new YT.Player('player-mount', {
            height: '0', width: '0',
            videoId: window.SONG_MAP.videoId,
            playerVars: { 'playsinline': 1, 'controls': 0 },
            events: {
                'onReady': () => {
                    const btn = document.getElementById('start-btn');
                    btn.disabled = false;
                    btn.innerText = "START SESSION";
                    document.getElementById('debug-msg').innerText = "All systems online.";
                },
                'onStateChange': (e) => {
                    if(e.data === 1 && !state.isPlaying) runGame();
                }
            }
        });
    };

    document.getElementById('start-btn').onclick = function() {
        document.getElementById('overlay').style.display = 'none';
        player.playVideo();
    };

    function runGame() {
        state.isPlaying = true;
        state.startTime = performance.now();
        requestAnimationFrame(gameLoop);
    }

    function gameLoop(now) {
        if(!state.isPlaying) return;
        const elapsed = now - state.startTime;
        const notes = window.SONG_MAP.notes;

        while(state.noteIndex < notes.length && elapsed >= notes[state.noteIndex].time - CONFIG.approachTime) {
            const n = notes[state.noteIndex];
            if(n.isEndOfMap) { state.isPlaying = false; setTimeout(()=>location.reload(), 3000); break; }
            spawn(n);
            state.noteIndex++;
        }

        state.activeNotes = state.activeNotes.filter(n => {
            const progress = (n.time - elapsed) / CONFIG.approachTime;
            if(progress > 0) {
                n.appEl.style.transform = `scale(${1 + progress * 1.5})`;
                n.appEl.style.opacity = 1 - progress;
            }
            if(elapsed > n.time + CONFIG.hitWindow) {
                n.el.remove(); n.appEl.remove();
                state.combo = 0; updateUI();
                return false;
            }
            return true;
        });
        requestAnimationFrame(gameLoop);
    }

    function spawn(note) {
        const cell = document.getElementById(`c-${note.cell}`);
        const el = document.createElement('div'); el.className = 'note';
        const appEl = document.createElement('div'); appEl.className = 'approach';
        cell.appendChild(el); cell.appendChild(appEl);
        state.activeNotes.push({ ...note, el, appEl });
    }

    container.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if(!state.isPlaying) return;
        Array.from(e.changedTouches).forEach(t => {
            const el = document.elementFromPoint(t.clientX, t.clientY);
            if(el && el.classList.contains('cell')) {
                const id = parseInt(el.id.split('-')[1]);
                el.classList.add('active'); setTimeout(() => el.classList.remove('active'), 80);
                const now = performance.now() - state.startTime;
                const hitIdx = state.activeNotes.findIndex(n => n.cell === id && Math.abs(now - n.time) < CONFIG.hitWindow);
                if(hitIdx !== -1) {
                    state.score += 500; state.combo++;
                    state.activeNotes[hitIdx].el.remove(); state.activeNotes[hitIdx].appEl.remove();
                    state.activeNotes.splice(hitIdx, 1);
                    updateUI();
                }
            }
        });
    }, { passive: false });

    function updateUI() {
        document.getElementById('score').innerText = state.score.toString().padStart(6, '0');
        document.getElementById('combo').innerText = state.combo;
    }
</script>

</body>
</html>
