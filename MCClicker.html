<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MC Clicker v1.8.0 - The Ultimate Update</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --mc-green: #54FB54; --mc-gui: #C6C6C6;
            --mc-border-dark: #373737; --mc-border-light: #FFFFFF;
            --frenzy-color: #FF5555; --reward-color: #FFD700;
            --prestige-color: #C0C0C0; 
            --rarity-common: #55FF55; --rarity-rare: #5555FF; --rarity-epic: #AA00AA;
        }

        body {
            background-color: #1a1a1a; color: white; font-family: 'VT323', monospace;
            margin: 0; display: flex; height: 100vh; width: 100vw; overflow: hidden;
            image-rendering: pixelated;
        }

        /* --- 彈窗系統 --- */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 100;
        }
        .notice-card {
            background: var(--mc-gui); border: 4px solid #000; width: 85%; max-width: 380px;
            padding: 30px 20px; position: relative; box-shadow: inset -4px -4px 0 var(--mc-border-dark), inset 4px 4px 0 var(--mc-border-light);
            color: #3f3f3f; text-align: center; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .close-btn {
            position: absolute; top: 5px; right: 5px; background: #AA0000; color: white;
            border: 2px solid #000; width: 28px; height: 28px; cursor: pointer; display: flex; justify-content: center; align-items: center;
        }

        /* --- 遊戲主畫面 --- */
        .game-area {
            flex: 0 0 65%; display: flex; flex-direction: column; border-right: 4px solid #000;
            position: relative; background: #222; overflow: hidden;
        }
        .version-tag { position: absolute; top: 10px; right: 15px; color: #555; font-size: 18px; }
        .prestige-tag { position: absolute; top: 10px; left: 15px; color: var(--prestige-color); font-size: 20px; text-shadow: 2px 2px 0 #000; }
        
        .frenzy-overlay {
            position: absolute; top:0; left:0; width:100%; height:100%;
            pointer-events: none; border: 0px solid var(--frenzy-color);
            transition: border 0.3s; z-index: 5;
        }
        body.frenzy .frenzy-overlay { border: 12px solid var(--frenzy-color); animation: flash 0.5s infinite; }
        @keyframes flash { 0% { opacity: 0.2; } 50% { opacity: 0.6; } 100% { opacity: 0.2; } }

        .level-section { padding: 20px 10px; text-align: center; z-index: 10; }
        .level-text { color: var(--mc-green); font-size: 42px; text-shadow: 3px 3px 0 #000; margin: 0; }
        .xp-bar { width: 85%; height: 20px; background: #313131; border: 4px solid #000; margin: 10px auto; position: relative; }
        #xp-fill { height: 100%; width: 0%; background: var(--mc-green); box-shadow: inset 0 -4px 0 #3E8E3E; transition: width 0.3s; }

        .main-click-part { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .emerald-display { font-size: 34px; margin-bottom: 20px; color: #55FF55; text-shadow: 2px 2px 0 #000; }
        
        #block {
            width: 140px; height: 140px; background: #5d9948; border: 6px solid #000;
            box-shadow: inset 10px 10px 0 #7ec850, inset -10px -10px 0 #3a632d;
            display: flex; align-items: center; justify-content: center; font-size: 26px;
            cursor: pointer; transition: transform 0.05s; text-shadow: 2px 2px 0 #000;
        }
        #block:active { transform: scale(0.9); }

        #lucky-box {
            position: absolute; width: 64px; height: 64px; background: #FFD700; border: 4px solid #000;
            display: none; cursor: pointer; z-index: 20; box-shadow: inset -4px -4px 0 #B8860B;
            justify-content: center; align-items: center; font-size: 30px;
            animation: bounce 0.4s infinite alternate;
        }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-12px); } }

        .shop-sidebar {
            flex: 1; background: var(--mc-gui); border-left: 2px solid var(--mc-border-light);
            display: flex; flex-direction: column; padding: 12px; color: #3f3f3f;
        }
        .upgrade-list { flex: 1; overflow-y: auto; }
        .upgrade-item {
            background: #8B8B8B; border: 3px solid #000; margin-bottom: 12px; padding: 10px;
            display: none; flex-direction: column; color: white; cursor: pointer;
            box-shadow: inset -3px -3px 0 #444, inset 3px 3px 0 #AAA;
        }
        .upgrade-item.unlocked { display: flex; }
        .upgrade-item.disabled { filter: grayscale(1); opacity: 0.6; cursor: not-allowed; }

        .btn-ui { font-family: 'VT323'; border: 3px solid #000; padding: 8px; cursor: pointer; margin-top: 5px; font-size: 18px; }
    </style>
</head>
<body id="game-body">

    <div id="notice-overlay" class="overlay">
        <div class="notice-card" id="card-style">
            <div class="close-btn" onclick="closeNotice()">X</div>
            <h2 id="notice-title">NOTICE</h2>
            <p id="rarity-badge" style="font-size: 18px; font-weight: bold; margin: 0;"></p>
            <p id="notice-body" style="font-size: 22px; font-weight: bold; line-height: 1.2;"></p>
            <button id="notice-btn" onclick="handleNoticeAction()" class="btn-ui" style="background: #55FF55; width: 100%;">OK</button>
        </div>
    </div>

    <div class="game-area">
        <div class="frenzy-overlay"></div>
        <div class="version-tag">v1.8.0</div>
        <div class="prestige-tag" id="pres-display">Prestige: 0</div>
        <div id="lucky-box" onclick="handleLuckyBox()">🎁</div>
        
        <div class="level-section">
            <p class="level-text"><span id="txt-lvl">Level</span> <span id="lvl">1</span></p>
            <div class="xp-bar"><div id="xp-fill"></div></div>
            <div style="font-size: 22px;">XP: <span id="cxp">0</span> / <span id="mxp">100</span></div>
        </div>

        <div class="main-click-part">
            <div id="status-display" style="font-size: 26px; display: none; margin-bottom: 10px;">
                <span id="txt-status">STATUS</span>: <span id="s-time">0</span>s
            </div>
            <div class="emerald-display"><span id="txt-emeralds">Emeralds</span>: <span id="em">0</span></div>
            <div id="block">MINE!</div>
            <div style="margin-top: 25px; font-size: 20px; color: #666;">EPS: <span id="eps">0</span></div>
        </div>
    </div>

    <div class="shop-sidebar">
        <div id="txt-shop-title" style="text-align:center; font-size: 26px; margin-bottom: 12px; border-bottom: 2px solid #888;">SHOP</div>
        <div class="upgrade-list">
            <div class="upgrade-item unlocked" id="u1" onclick="buy('u1')"><span class="u-name"></span><span style="color:#ffff55; font-size:20px;" id="c1"></span></div>
            <div class="upgrade-item unlocked" id="u2" onclick="buy('u2')"><span class="u-name"></span><span style="color:#ffff55; font-size:20px;" id="c2"></span></div>
            <div class="upgrade-item" id="u3" onclick="buy('u3')"><span class="u-name"></span><span style="color:#ffff55; font-size:20px;" id="c3"></span></div>
            <div class="upgrade-item" id="u4" onclick="buy('u4')"><span class="u-name"></span><span style="color:#ffff55; font-size:20px;" id="c4"></span></div>
            <div class="upgrade-item" id="u5" onclick="buy('u5')"><span class="u-name"></span><span style="color:#ffff55; font-size:20px;" id="c5"></span></div>
        </div>
        <button onclick="toggleLang()" class="btn-ui" style="background: #eee;">繁體中文 / English</button>
        <button id="btn-reset" onclick="resetGame()" class="btn-ui" style="background: #444; color: #888;">Reset Progress</button>
    </div>

    <script>
        const i18n = {
            en: {
                shop: "TRADING BAR", lvl: "Level", ems: "Emeralds", reset: "Reset Progress",
                frenzy: "FRENZY", xpBoost: "XP BOOST", claim: "CLAIM!", pres: "Prestige",
                updateTitle: "VERSION 1.8.0",
                updateBody: "• Added Rarity Quests!\n• Added Random Ads & Rewards\n• Ascension System Improved",
                questNames: ["Urgent Mining", "Supply Run", "Legendary Challenge"],
                questDesc: ["Click {target} times in 20s!", "Earn {target} Ems in 20s!", "Click {target} times in 15s!"],
                rarity: ["COMMON", "RARE", "EPIC"],
                fakeAds: [
                    { t: "SINGLE VILLAGERS?", b: "There are single villagers in your area! Click to trade!" },
                    { t: "FREE DIAMONDS!", b: "Win free diamonds by clicking this totally safe link!" },
                    { t: "HOT TIPS!", b: "Did you know? Every Prestige point doubles your production!" }
                ],
                upgrades: ["Wooden Pick", "Iron Pick", "Golden Pick", "Diamond Mine", "Netherite Drill"]
            },
            zh: {
                shop: "交易中心", lvl: "等級", ems: "綠寶石", reset: "重置進度",
                frenzy: "狂暴模式", xpBoost: "經驗加倍", claim: "領取獎勵！", pres: "聲望轉生",
                updateTitle: "版本更新 1.8.0",
                updateBody: "• 新增隨機稀有度任務！\n• 新增搞笑廣告與補償獎勵\n• 優化轉生與 UI 顯示",
                questNames: ["緊急採礦", "物資籌備", "傳說挑戰"],
                questDesc: ["20秒內點擊方塊 {target} 下！", "20秒內賺取 {target} 顆綠寶石！", "15秒內點擊 {target} 下！"],
                rarity: ["普通", "稀有", "史詩"],
                fakeAds: [
                    { t: "想找村民約會？", b: "附近有單身村民想跟你交易！點擊查看！" },
                    { t: "免費鑽石！", b: "點擊這個絕對安全的鏈接領取免費鑽石！" },
                    { t: "專家提示！", b: "你知道嗎？每一點聲望都會讓你的產量翻倍！" }
                ],
                upgrades: ["木鎬", "鐵鎬", "金鎬", "鑽石礦場", "獄髓鑽頭"]
            }
        };

        let state = JSON.parse(localStorage.getItem('mc_v180')) || {
            em: 0, xp: 0, lvl: 1, eps: 0, lang: 'zh', prestige: 0,
            u: { 
                u1: {c: 15, p: 1, r: 1}, u2: {c: 100, p: 5, r: 1}, 
                u3: {c: 500, p: 15, r: 10}, u4: {c: 2500, p: 60, r: 35},
                u5: {c: 12000, p: 250, r: 70}
            }
        };

        let currentMode = 'idle'; // idle, quest_notice, ad, update
        let activeBoost = { type: 'none', mult: 1, time: 0 };
        let quest = { active: false, rarity: 0, target: 0, progress: 0, time: 0, reward: 0, startEm: 0 };
        const el = (id) => document.getElementById(id);

        function updateUI() {
            const t = i18n[state.lang];
            el('pres-display').innerText = `${t.pres}: ${state.prestige}`;
            el('txt-shop-title').innerText = t.shop;
            el('txt-lvl').innerText = t.lvl;
            el('txt-emeralds').innerText = t.ems;
            el('btn-reset').innerText = t.reset;

            el('em').innerText = Math.floor(state.em);
            el('lvl').innerText = state.lvl;
            el('cxp').innerText = Math.floor(state.xp);
            let next = state.lvl * 100;
            el('mxp').innerText = next;
            el('xp-fill').style.width = Math.min((state.xp / next * 100), 100) + "%";

            let presMult = 1 + state.prestige;
            let currentEPS = state.eps * presMult * (activeBoost.type === 'frenzy' ? activeBoost.mult : 1);
            el('eps').innerText = currentEPS.toFixed(1);

            Object.keys(state.u).forEach((id, idx) => {
                let item = state.u[id];
                if (state.lvl >= item.r) el(id).classList.add('unlocked');
                el(id).classList.toggle('disabled', state.em < item.c);
                el(id).querySelector('.u-name').innerText = `${t.upgrades[idx]} (+${item.p} EPS)`;
                el('c' + id.slice(1)).innerText = Math.floor(item.c) + " E";
            });

            if (quest.active) {
                el('status-display').style.display = 'block';
                el('txt-status').innerText = i18n[state.lang].questActive;
                el('s-time').innerText = quest.time;
                if (quest.rarity !== 1) el('block').innerText = `${quest.progress}/${quest.target}`;
            } else if (activeBoost.time > 0) {
                el('status-display').style.display = 'block';
                el('txt-status').innerText = activeBoost.type === 'frenzy' ? t.frenzy : t.xpBoost;
                el('s-time').innerText = activeBoost.time;
                document.body.className = 'frenzy';
            } else {
                el('status-display').style.display = 'none';
                document.body.className = '';
                el('block').innerText = "MINE!";
            }
            localStorage.setItem('mc_v180', JSON.stringify(state));
        }

        // --- 彈窗觸發器 ---
        function triggerUpdateNotice() {
            currentMode = 'update';
            const t = i18n[state.lang];
            el('notice-overlay').style.display = 'flex';
            el('card-style').style.borderColor = 'var(--reward-color)';
            el('notice-title').innerText = t.updateTitle;
            el('notice-body').innerText = t.updateBody;
            el('rarity-badge').innerText = "";
            el('notice-btn').innerText = "AWESOME!";
        }

        function triggerAd() {
            if (currentMode !== 'idle' || quest.active) return;
            currentMode = 'ad';
            const t = i18n[state.lang];
            const ad = t.fakeAds[Math.floor(Math.random() * t.fakeAds.length)];
            el('notice-overlay').style.display = 'flex';
            el('card-style').style.borderColor = '#000';
            el('notice-title').innerText = "SPONSORED";
            el('notice-body').innerText = ad.b;
            el('rarity-badge').innerText = ad.t;
            el('notice-btn').innerText = "CLAIM COMPENSATION (+10E)";
        }

        function triggerQuest() {
            if (currentMode !== 'idle' || quest.active) return;
            let roll = Math.random() * 100;
            quest.rarity = roll < 5 ? 2 : (roll < 30 ? 1 : 0);
            
            const t = i18n[state.lang];
            let pBonus = 1 + (state.prestige * 0.1);
            if (quest.rarity === 0) { quest.target = Math.floor(150 * pBonus); quest.time = 20; quest.reward = (state.eps * 100) + 500; }
            else if (quest.rarity === 1) { quest.target = Math.floor((state.eps * 30 + 1000) * pBonus); quest.time = 20; quest.reward = (state.eps * 300) + 2000; }
            else { quest.target = Math.floor(280 * pBonus); quest.time = 15; quest.reward = (state.eps * 1000) + 10000; }

            currentMode = 'quest_notice';
            el('notice-overlay').style.display = 'flex';
            let colors = ['var(--rarity-common)', 'var(--rarity-rare)', 'var(--rarity-epic)'];
            el('card-style').style.borderColor = colors[quest.rarity];
            el('notice-title').innerText = t.questNames[quest.rarity];
            el('rarity-badge').innerText = `[ ${t.rarity[quest.rarity]} ]`;
            el('notice-body').innerText = t.questDesc[quest.rarity].replace('{target}', quest.target);
            el('notice-btn').innerText = "ACCEPT CHALLENGE!";
        }

        function handleNoticeAction() {
            if (currentMode === 'quest_notice') {
                quest.active = true; quest.progress = 0; quest.startEm = state.em;
            } else if (currentMode === 'ad') {
                state.em += 10;
            }
            closeNotice();
        }

        function closeNotice() {
            el('notice-overlay').style.display = 'none';
            currentMode = 'idle';
            updateUI();
        }

        function mine() {
            if (quest.active && quest.rarity !== 1) {
                quest.progress++;
                if (quest.progress >= quest.target) endQuest(true);
            }
            let m = (activeBoost.type === 'frenzy') ? activeBoost.mult : 1;
            state.em += 1 * m * (1 + state.prestige);
            state.xp += 10;
            checkLevel(); updateUI();
        }

        function checkLevel() {
            let next = state.lvl * 100;
            if (state.xp >= next) { state.xp -= next; state.lvl++; updateUI(); }
        }

        function endQuest(success) {
            quest.active = false;
            if (success) {
                state.em += quest.reward;
                if (quest.rarity === 1) activeBoost = { type: 'frenzy', mult: 2, time: 15 };
                if (quest.rarity === 2) activeBoost = { type: 'frenzy', mult: 5, time: 30 };
            }
            updateUI();
        }

        // --- 核心循環 ---
        setInterval(() => {
            if (state.eps > 0) {
                let m = (activeBoost.type === 'frenzy') ? activeBoost.mult : 1;
                let amt = (state.eps * m * (1 + state.prestige)) / 10;
                state.em += amt; state.xp += amt * 2;
                if (quest.active && quest.rarity === 1) {
                    quest.progress = Math.floor(state.em - quest.startEm);
                    if (quest.progress >= quest.target) endQuest(true);
                }
                checkLevel(); updateUI();
            }
        }, 100);

        setInterval(() => {
            if (activeBoost.time > 0) activeBoost.time--;
            if (quest.active) { quest.time--; if (quest.time <= 0) endQuest(false); }
            updateUI();
        }, 1000);

        setInterval(() => {
            if (Math.random() > 0.3) triggerQuest(); else triggerAd();
        }, 70000);

        function buy(id) {
            let item = state.u[id];
            if (state.em >= item.c && state.lvl >= item.r) {
                state.em -= item.c; state.eps += item.p; item.c *= 1.4; updateUI();
            }
        }
        function toggleLang() { state.lang = state.lang === 'zh' ? 'en' : 'zh'; updateUI(); }
        function resetGame() { if(confirm('Reset?')) { localStorage.clear(); location.reload(); } }
        function handleLuckyBox() { el('lucky-box').style.display = 'none'; activeBoost = { type: 'frenzy', mult: 2, time: 15 }; updateUI(); }

        updateUI();
        setTimeout(triggerUpdateNotice, 500); // 一進來就跳更新公告
        el('block').onclick = mine;
        el('block').ontouchstart = (e) => { e.preventDefault(); mine(); };
    </script>
</body>
</html>
